name: Desktop App Update

on:
  push:
    branches:
      - main
    paths:
      - app/desktop/**
      - .forgejo/workflows/desktop-app-update.yml

jobs:
  build-and-publish:
    runs-on: macos
    env:
      HANASAND_APP_VERSION: 0.1.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build update package
        run: app/desktop/scripts/package-update.sh

      - name: Publish update package
        env:
          HANASAND_APP_UPDATE_HOST: ${{ secrets.HANASAND_APP_UPDATE_HOST }}
          HANASAND_APP_UPDATE_USER: ${{ secrets.HANASAND_APP_UPDATE_USER }}
          HANASAND_APP_UPDATE_PATH: ${{ secrets.HANASAND_APP_UPDATE_PATH }}
        run: |
          set -euo pipefail
          HOST="${HANASAND_APP_UPDATE_HOST:-hanasand}"
          USER="${HANASAND_APP_UPDATE_USER:-ubuntu}"
          UPDATE_PATH="${HANASAND_APP_UPDATE_PATH:-/srv/hanasand/app-updates}"
          PACKAGE="$(ls app/desktop/dist/Hanasand-*-macos.zip | tail -n 1)"
          cp "$PACKAGE" app/desktop/dist/latest-macos.zip
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest_path = Path("app/desktop/dist/manifest.json")
          manifest = json.loads(manifest_path.read_text())
          manifest["package"] = "latest-macos.zip"
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")
          PY
          rsync -az app/desktop/dist/latest-macos.zip app/desktop/dist/manifest.json "${USER}@${HOST}:${UPDATE_PATH}/"

      - name: Print deployment hints
        run: |
          cat app/desktop/dist/manifest.json
          echo "The API auto-discovers manifest.json from HANASAND_APP_UPDATE_DIR."
