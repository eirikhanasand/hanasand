services:
  deploy-path-guard:
    image: alpine:3.22
    working_dir: /workspace
    command: >
      sh -ec 'host="$$(cat /host/etc-hostname 2>/dev/null || hostname)";
      if [ "$$host" = "hanasand" ] || [ "$$host" = "inspur" ]; then
        test "$$HANASAND_DEPLOY_GUARD_CWD" = "/home/hanasand/hanasand";
        test -e /workspace/.git;
      fi;
      sleep infinity'
    environment:
      HANASAND_DEPLOY_GUARD_CWD: ${PWD:-}
    volumes:
      - .:/workspace:ro
      - /etc/hostname:/host/etc-hostname:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "host=$$(cat /host/etc-hostname 2>/dev/null || hostname); if [ \"$$host\" = \"hanasand\" ] || [ \"$$host\" = \"inspur\" ]; then test \"$$HANASAND_DEPLOY_GUARD_CWD\" = \"/home/hanasand/hanasand\" && test -e /workspace/.git; fi",
        ]
      interval: 5s
      retries: 3

  frontend:
    container_name: hanasand
    image: hanasand
    mem_limit: 2g
    cpus: "2.0"
    restart: always
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    env_file:
      .env
    environment:
      FRONTEND_INTERNAL_API: ${FRONTEND_INTERNAL_API:-http://api:8080/api}
      TI_SCRAPER_API_BASE: ${TI_SCRAPER_API_BASE:-http://ti-scraper:8097}
      MAIL_JMAP_INTERNAL_URL: ${MAIL_JMAP_INTERNAL_URL:-http://stalwart:8080}
      MAIL_PUBLIC_BASE_URL: ${MAIL_PUBLIC_BASE_URL:-https://mail.hanasand.com}
      MAIL_INBOX_USERNAME: ${MAIL_INBOX_USERNAME:-eirik}
      MAIL_INBOX_ADDRESS: ${MAIL_INBOX_ADDRESS:-contact@hanasand.com}
      MAIL_INBOX_PASSWORD: ${MAIL_INBOX_PASSWORD:-}
    ports:
      - "3000:3000"
    volumes:
      - prompt_portal_state:/var/lib/hanasand-prompt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000"]
      start_period: 30s
      interval: 5s
      retries: 5
    networks:
      - hanasandnet
    depends_on:
      deploy-path-guard:
        condition: service_healthy

  api:
    container_name: hanasand_api
    image: hanasand_api
    mem_limit: 2g
    cpus: "2.0"
    restart: always
    build:
      context: ./api
      dockerfile: ./Dockerfile
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    env_file:
      .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/snap/lxd/common/lxd/unix.socket:/var/snap/lxd/common/lxd/unix.socket
      - /var/spool/cron/crontabs:/host/cron/crontabs
      - api_state:/var/lib/hanasand
      - ${HANASAND_APP_UPDATE_DIR:-/srv/hanasand/app-updates}:/srv/hanasand/app-updates
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TI_SCRAPER_API_BASE: ${TI_SCRAPER_API_BASE:-http://ti-scraper:8097}
      TI_SCRAPER_SERVICE_TOKEN: ${TI_SCRAPER_SERVICE_TOKEN:-}
      DWM_WEBHOOK_LIVE_DELIVERY: ${DWM_WEBHOOK_LIVE_DELIVERY:-true}
      API_CORS_ALLOWED_ORIGINS: ${API_CORS_ALLOWED_ORIGINS:-https://hanasand.com,https://www.hanasand.com}
      MAIL_INTERNAL_URL: ${MAIL_INTERNAL_URL:-http://stalwart:8080}
      MAIL_HOST: ${MAIL_HOST:-mail.hanasand.com}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-hanasand.com}
      MAIL_ADMIN_USERNAME: ${MAIL_ADMIN_USERNAME:-admin}
      MAIL_ADMIN_PASSWORD: ${MAIL_ADMIN_PASSWORD:-}
      MAIL_PRIVILEGED_USERS: ${MAIL_PRIVILEGED_USERS:-admin,administrator,eirik,eirikhanasand}
      MAIL_USER_ALIASES: ${MAIL_USER_ALIASES:-eirikhanasand:eirik}
      MAIL_SYSTEM_MAILBOX_USER: ${MAIL_SYSTEM_MAILBOX_USER:-eirikhanasand}
      MAIL_SYSTEM_SENDER_LOCAL_PART: ${MAIL_SYSTEM_SENDER_LOCAL_PART:-noreply}
      MAIL_SYSTEM_ALIASES: ${MAIL_SYSTEM_ALIASES:-postmaster,abuse,hostmaster,tls-reports,noreply-dmarc}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT:-993}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_INTERNAL_PORT: ${MAIL_SMTP_INTERNAL_PORT:-25}
      COMMERCIAL_CONTACT_RECIPIENT: ${COMMERCIAL_CONTACT_RECIPIENT:-eirik@hanasand.com}
      MAIL_MANAGESIEVE_PORT: ${MAIL_MANAGESIEVE_PORT:-4190}
      MANAGED_CRON_GID: ${MANAGED_CRON_GID:-990}
      VM_HOST_ID: ${VM_HOST_ID:-ovhcloud}
      ONION_SESSION_PROXY: ${ONION_SESSION_PROXY:-socks5://onion-tor:9050}
      BROWSER_SANDBOX_WORKER_NETWORK: ${BROWSER_SANDBOX_WORKER_NETWORK:-hanasand_browsernet}
      BROWSER_SANDBOX_MAX_SESSIONS: ${BROWSER_SANDBOX_MAX_SESSIONS:-100}
      BROWSER_SANDBOX_EGRESS_FIREWALL_READY: ${BROWSER_SANDBOX_EGRESS_FIREWALL_READY:-0}
      BROWSER_SANDBOX_PREWARM: "0"
      VULNERABILITY_SCAN_STATE_PATH: ${VULNERABILITY_SCAN_STATE_PATH:-/var/lib/hanasand/vulnerability-scan.json}
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/var/lib/hanasand/backups/database}
      DB_BACKUP_STATE_PATH: ${DB_BACKUP_STATE_PATH:-/var/lib/hanasand/backups/database/.backup-state.json}
      DB_BACKUP_SCHEDULE: ${DB_BACKUP_SCHEDULE:-23 2 * * *}
      DB_BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS:-14}
      DB_BACKUP_ENABLED: ${DB_BACKUP_ENABLED:-true}
      HANASAND_RELEASE_COMMIT: ${HANASAND_RELEASE_COMMIT:-unknown}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api"]
      interval: 5s
      retries: 5
    networks:
      - hanasandnet
      - pwnednet
      - browsernet
    depends_on:
      deploy-path-guard:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stalwart:
        condition: service_started
      ti-scraper:
        condition: service_healthy
      onion-tor:
        condition: service_started

  browser-worker:
    container_name: hanasand_browser_worker
    profiles:
      - unsafe-dev-only
    image: hanasand_browser_worker
    mem_limit: 3g
    cpus: "3.0"
    init: true
    restart: always
    build:
      context: ./api
      dockerfile: ./Dockerfile
      target: browser-runtime
    user: "1000"
    environment:
      NODE_ENV: production
      PORT: 8090
      HOME: /tmp
      DISPLAY: ":20"
      START_XFCE4: "false"
      BROWSER_STREAM_RESOLUTION: 1280x720
      SELKIES_ENABLE_BASIC_AUTH: "false"
      SELKIES_ENABLE_RESIZE: "false"
      SELKIES_ENCODER: vp8enc
      SELKIES_FRAMERATE: "30"
      SELKIES_VIDEO_BITRATE: "4000"
      BROWSER_SANDBOX_WORKER_ONLY: "1"
      BROWSER_SANDBOX_SKIP_RUN_DB: "1"
      BROWSER_SANDBOX_CHROMIUM_SANDBOX: "1"
      BROWSER_SANDBOX_MAX_SESSIONS: "1"
      BROWSER_SANDBOX_PREWARM: "0"
      ONION_SESSION_PROXY: ${ONION_SESSION_PROXY:-socks5://onion-tor:9050}
    expose:
      - "8080"
      - "8081"
      - "8090"
      - "9081"
    privileged: false
    ipc: private
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1g
      - /etc/nginx/sites-available:rw,noexec,nosuid,size=1m,uid=1000,gid=1000
      - /var/lib/nginx:rw,noexec,nosuid,size=16m,uid=1000,gid=1000
    cap_add: []
    cap_drop:
      - ALL
    security_opt:
      - seccomp=./ops/browser-worker/seccomp-chromium.json
      - apparmor=docker-default
      - no-new-privileges
    shm_size: "1gb"
    pids_limit: 512
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health && curl -fsS http://127.0.0.1:8090"]
      interval: 5s
      retries: 5
      start_period: 20s
    networks:
      - browsernet
    depends_on:
      deploy-path-guard:
        condition: service_healthy
      onion-tor:
        condition: service_started

  browser-turn:
    container_name: hanasand_browser_turn
    image: coturn/coturn:4.6.3-r3
    restart: always
    command:
      - --no-cli
      - --no-tls
      - --no-dtls
      - --fingerprint
      - --realm=hanasand.com
      - --use-auth-secret
      - --static-auth-secret=${BROWSER_SANDBOX_TURN_SECRET:-unsafe-dev-turn-secret}
      - --external-ip=${BROWSER_SANDBOX_TURN_HOST:-127.0.0.1}
      - --listening-port=3478
      - --min-port=49152
      - --max-port=49252
      - --no-multicast-peers
      - --log-file=stdout
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49252:49152-49252/udp"
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    networks:
      - browsernet

  onion-tor:
    container_name: hanasand_onion_tor
    image: hanasand_onion_tor
    restart: always
    build:
      context: ./ops/onion-tor
      dockerfile: ./Dockerfile
    expose:
      - "8118"
      - "9050"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8118 && nc -z 127.0.0.1 9050"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    networks:
      - hanasandnet
      - browsernet
    depends_on:
      deploy-path-guard:
        condition: service_healthy

  ai-parser-bridge:
    container_name: hanasand_ai_parser_bridge
    image: hanasand_ai_parser_bridge
    restart: always
    build:
      context: .
      dockerfile: ./ti/ai-parser-bridge/Dockerfile
    env_file:
      .env
    environment:
      HANASAND_AI_BRIDGE_PORT: ${HANASAND_AI_BRIDGE_PORT:-18181}
      HANASAND_AI_TRANSPORT: ${HANASAND_AI_TRANSPORT:-tools-ai}
      HANASAND_AI_TOOLS_API: ${HANASAND_AI_TOOLS_API:-http://api:8080/api/tools/ai}
      HANASAND_AI_MODELS_URL: ${HANASAND_AI_MODELS_URL:-http://api:8080/api/ai/models}
      HANASAND_AI_OPENAI_BASE: ${HANASAND_AI_OPENAI_BASE:-http://127.0.0.1:18081}
      HANASAND_AI_MODEL: ${HANASAND_AI_MODEL:-hanasand}
    healthcheck:
      test: ["CMD-SHELL", "wget -T 2 -t 1 -qO- http://127.0.0.1:${HANASAND_AI_BRIDGE_PORT:-18181}/health"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - hanasandnet
    depends_on:
      deploy-path-guard:
        condition: service_healthy

  ai-model-client:
    container_name: hanasand_ai_model_client
    image: hanasand_ai_model_client
    restart: always
    build:
      context: .
      dockerfile: ./ti/ai-model-client/Dockerfile
    env_file:
      .env
    environment:
      HANASAND_AI_CLIENT_API_WS: ${HANASAND_AI_CLIENT_API_WS:-ws://127.0.0.1:8080/api/client/ws/gpt}
      HANASAND_AI_OPENAI_BASE: ${HANASAND_AI_OPENAI_BASE:-http://127.0.0.1:18081}
      HANASAND_AI_MODEL: ${HANASAND_AI_MODEL:-hanasand}
      HANASAND_AI_CLIENT_NAME: ${HANASAND_AI_CLIENT_NAME:-hanasand-inspur}
      HANASAND_AI_CLIENT_HEALTH_PORT: ${HANASAND_AI_CLIENT_HEALTH_PORT:-18182}
    healthcheck:
      test: ["CMD-SHELL", "wget -T 2 -t 1 -qO- http://127.0.0.1:${HANASAND_AI_CLIENT_HEALTH_PORT:-18182}/health"]
      interval: 10s
      retries: 5
      start_period: 10s
    network_mode: host
    depends_on:
      deploy-path-guard:
        condition: service_healthy
      api:
        condition: service_healthy

  ti-scraper:
    container_name: hanasand_ti_scraper
    image: hanasand_ti_scraper
    mem_limit: 16g
    cpus: "8.0"
    restart: always
    stop_grace_period: 10m
    build:
      context: .
      dockerfile: ./ti/scraper/Dockerfile
    environment:
      SCRAPER_PORT: 8097
      SCRAPER_ENV: production
      SCRAPER_MEMORY_TARGET_MB: 8192
      SCRAPER_MEMORY_CEILING_MB: 14336
      SCRAPER_MAX_REQUEST_TASKS: 500
      SCRAPER_DARKNET_METADATA_ONLY: "true"
      SCRAPER_HIGH_RISK_REQUIRES_APPROVAL: "true"
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-hanasand}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB:-hanasand}
      TI_EVIDENCE_ROOT: /var/lib/ti-scraper/evidence
      TI_EVIDENCE_METADATA_PATH: /var/lib/ti-scraper/evidence/metadata/scraper-store.json
      TI_EVIDENCE_OBJECT_DIR: /var/lib/ti-scraper/evidence/objects
      TI_CANARY_ENABLED: "true"
      TI_CANARY_AUTO_ACTIVATE: "false"
      TI_CANARY_INTERVAL_SECONDS: 300
      TI_CANARY_MAX_TASKS: 1200
      TI_CANARY_MAX_SOURCES: 1200
      TI_CANARY_MAX_CONCURRENT_TASKS: 32
      TI_CANARY_TIMEOUT_MS: 8000
      TI_CANARY_MAX_ITEMS_PER_TASK: 2
      TI_RANSOMWARELIVE_MAX_ITEMS: 24
      TI_CANARY_MAX_QUEUE_SIZE: 10000
      TI_CANARY_BUDGET_TASKS: 1200
      TI_CANARY_BUDGET_BYTES: 768000000
      TI_SOURCE_SEED_ACTIVATE: "true"
      TI_SOURCE_SEED_PATHS: /app/ti/scraper/seeds/public_cti_sources.json,/app/ti/scraper/seeds/verified_long_lived_sources.json,/app/ti/scraper/seeds/verified_query_providers.json,/app/ti/scraper/seeds/public_cti_starter_pack.json,/app/ti/scraper/seeds/public_telegram_channel_packs.json,/app/ti/scraper/seeds/restricted_metadata_source_packs.json
      TI_IMPORT_RESTRICTED_METADATA_SOURCES: ${TI_IMPORT_RESTRICTED_METADATA_SOURCES:-true}
      TI_RESTRICTED_METADATA_ENABLED: ${TI_RESTRICTED_METADATA_ENABLED:-true}
      TI_RESTRICTED_METADATA_INTERVAL_SECONDS: ${TI_RESTRICTED_METADATA_INTERVAL_SECONDS:-900}
      TI_RESTRICTED_METADATA_MAX_SOURCES: ${TI_RESTRICTED_METADATA_MAX_SOURCES:-2}
      TI_TOR_METADATA_PROXY: http://onion-tor:8118
      TI_IMPORT_CREDENTIAL_REQUIRED_SOURCES: ${TI_IMPORT_CREDENTIAL_REQUIRED_SOURCES:-false}
      HANASAND_AI_API_BASE: ${HANASAND_AI_API_BASE:-http://ai-parser-bridge:18181}
      HANASAND_AI_HEALTH_PATH: ${HANASAND_AI_HEALTH_PATH:-/health}
      HANASAND_AI_EXPOSURE_PARSE_PATH: ${HANASAND_AI_EXPOSURE_PARSE_PATH:-/v1/parse/exposure-claim}
      HANASAND_AI_PARSE_TIMEOUT_MS: ${HANASAND_AI_PARSE_TIMEOUT_MS:-12000}
      HANASAND_AI_EVALUATION_API: ${HANASAND_AI_EVALUATION_API:-http://api:8080/api/tools/ai}
      HANASAND_AI_EVALUATION_MODEL_VERSION: ${HANASAND_AI_EVALUATION_MODEL_VERSION:-hanasand}
      HANASAND_AI_EVALUATION_TIMEOUT_MS: ${HANASAND_AI_EVALUATION_TIMEOUT_MS:-30000}
      HANASAND_AI_REVIEW_CONCURRENCY: ${HANASAND_AI_REVIEW_CONCURRENCY:-3}
      TI_AUTOMATIC_EVALUATION_ENABLED: ${TI_AUTOMATIC_EVALUATION_ENABLED:-true}
      TI_AUTOMATIC_EVALUATION_INTERVAL_SECONDS: ${TI_AUTOMATIC_EVALUATION_INTERVAL_SECONDS:-60}
      TI_AUTOMATIC_EVALUATION_MAX_TASKS_PER_CYCLE: ${TI_AUTOMATIC_EVALUATION_MAX_TASKS_PER_CYCLE:-2}
      TI_AUTOMATIC_EVALUATION_SAMPLE_SIZE: ${TI_AUTOMATIC_EVALUATION_SAMPLE_SIZE:-50}
      HANASAND_AUTH_API_BASE: ${HANASAND_AUTH_API_BASE:-http://api:8080/api}
      TI_SCRAPER_SERVICE_TOKEN: ${TI_SCRAPER_SERVICE_TOKEN:-}
    volumes:
      - ti_scraper_evidence:/var/lib/ti-scraper/evidence
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8097"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8097/v1/health"]
      start_period: 90s
      interval: 5s
      retries: 5
    networks:
      - hanasandnet
    depends_on:
      deploy-path-guard:
        condition: service_healthy
      ai-parser-bridge:
        condition: service_started
      postgres:
        condition: service_healthy
      onion-tor:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: hanasand_database
    mem_limit: 2g
    cpus: "2.0"
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hanasand}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB:-hanasand}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:${DB_LOCAL_PORT:-8503}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanasand -d hanasand"]
      interval: 5s
      retries: 5
    networks:
      - hanasandnet
    depends_on:
      deploy-path-guard:
        condition: service_healthy

  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: hanasand_mail
    mem_limit: 1g
    cpus: "2.0"
    restart: always
    environment:
      STALWART_RECOVERY_ADMIN: ${STALWART_RECOVERY_ADMIN:-${MAIL_ADMIN_USERNAME:-admin}:${MAIL_ADMIN_PASSWORD:-}}
    command: ["--config", "/opt/stalwart/etc/config.json"]
    volumes:
      - ./mail/stalwart:/opt/stalwart
    ports:
      - "127.0.0.1:${MAIL_HTTP_LOCAL_PORT:-8081}:8080"
      - "127.0.0.1:${MAIL_SMTP_LOCAL_PORT:-2525}:25"
      - "127.0.0.1:${MAIL_SMTPS_LOCAL_PORT:-2465}:465"
      - "127.0.0.1:${MAIL_SUBMISSION_LOCAL_PORT:-2587}:587"
      - "127.0.0.1:${MAIL_IMAP_LOCAL_PORT:-2143}:143"
      - "127.0.0.1:${MAIL_IMAPS_LOCAL_PORT:-2993}:993"
      - "127.0.0.1:${MAIL_MANAGESIEVE_LOCAL_PORT:-4191}:4190"
    networks:
      - hanasandnet

volumes:
  api_state:
  prompt_portal_state:
  postgres_data:
    external: true
    name: hanasand_postgres_data
  ti_scraper_evidence:
    external: true
    name: hanasand_ti_scraper_evidence

networks:
  pwnednet:
    external: true
  hanasandnet:
    driver: bridge
  browsernet:
    name: hanasand_browsernet
    driver: bridge
