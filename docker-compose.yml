services:
  frontend:
    container_name: hanasand
    image: hanasand
    mem_limit: 2g
    cpus: "2.0"
    restart: always
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    env_file:
      .env
    environment:
      FRONTEND_INTERNAL_API: ${FRONTEND_INTERNAL_API:-http://api:8080/api}
      TI_SCRAPER_API_BASE: ${TI_SCRAPER_API_BASE:-http://ti-scraper:8097}
      MAIL_JMAP_INTERNAL_URL: ${MAIL_JMAP_INTERNAL_URL:-http://stalwart:8080}
      MAIL_PUBLIC_BASE_URL: ${MAIL_PUBLIC_BASE_URL:-https://mail.hanasand.com}
      MAIL_INBOX_USERNAME: ${MAIL_INBOX_USERNAME:-eirik}
      MAIL_INBOX_ADDRESS: ${MAIL_INBOX_ADDRESS:-eirik@hanasand.com}
      MAIL_INBOX_PASSWORD: ${MAIL_INBOX_PASSWORD:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000"]
      start_period: 30s
      interval: 5s
      retries: 5
    networks:
      - hanasandnet

  api:
    container_name: hanasand_api
    image: hanasand_api
    mem_limit: 1g
    cpus: "2.0"
    restart: always
    build:
      context: ./api
      dockerfile: ./Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/snap/lxd/common/lxd/unix.socket:/var/snap/lxd/common/lxd/unix.socket
      - /var/spool/cron/crontabs:/host/cron/crontabs
      - ${HANASAND_APP_UPDATE_DIR:-/srv/hanasand/app-updates}:/srv/hanasand/app-updates
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TI_SCRAPER_API_BASE: ${TI_SCRAPER_API_BASE:-http://ti-scraper:8097}
      MAIL_INTERNAL_URL: ${MAIL_INTERNAL_URL:-http://host.docker.internal:${MAIL_HTTP_LOCAL_PORT:-8081}}
      MAIL_HOST: ${MAIL_HOST:-mail.hanasand.com}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-hanasand.com}
      MAIL_ADMIN_USERNAME: ${MAIL_ADMIN_USERNAME:-admin}
      MAIL_ADMIN_PASSWORD: ${MAIL_ADMIN_PASSWORD:-}
      MAIL_PRIVILEGED_USERS: ${MAIL_PRIVILEGED_USERS:-admin,administrator,eirik,eirikhanasand}
      MAIL_USER_ALIASES: ${MAIL_USER_ALIASES:-eirikhanasand:eirik}
      MAIL_SYSTEM_MAILBOX_USER: ${MAIL_SYSTEM_MAILBOX_USER:-eirikhanasand}
      MAIL_SYSTEM_SENDER_LOCAL_PART: ${MAIL_SYSTEM_SENDER_LOCAL_PART:-noreply}
      MAIL_SYSTEM_ALIASES: ${MAIL_SYSTEM_ALIASES:-postmaster,abuse,hostmaster,tls-reports,noreply-dmarc}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT:-993}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_INTERNAL_PORT: ${MAIL_SMTP_INTERNAL_PORT:-${MAIL_SMTP_LOCAL_PORT:-2525}}
      MAIL_MANAGESIEVE_PORT: ${MAIL_MANAGESIEVE_PORT:-4190}
      MANAGED_CRON_GID: ${MANAGED_CRON_GID:-990}
      VM_HOST_ID: ${VM_HOST_ID:-ovhcloud}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api"]
      interval: 5s
      retries: 5
    networks:
      - hanasandnet
      - pwnednet
    depends_on:
      postgres:
        condition: service_healthy
      stalwart:
        condition: service_started
      ti-scraper:
        condition: service_healthy

  ai-parser-bridge:
    container_name: hanasand_ai_parser_bridge
    image: hanasand_ai_parser_bridge
    restart: always
    build:
      context: .
      dockerfile: ./ti/ai-parser-bridge/Dockerfile
    env_file:
      .env
    environment:
      HANASAND_AI_BRIDGE_PORT: ${HANASAND_AI_BRIDGE_PORT:-18181}
      HANASAND_AI_TRANSPORT: ${HANASAND_AI_TRANSPORT:-tools-ai}
      HANASAND_AI_TOOLS_API: ${HANASAND_AI_TOOLS_API:-http://api:8080/api/tools/ai}
      HANASAND_AI_MODELS_URL: ${HANASAND_AI_MODELS_URL:-http://api:8080/api/ai/models}
      HANASAND_AI_OPENAI_BASE: ${HANASAND_AI_OPENAI_BASE:-http://127.0.0.1:18081}
      HANASAND_AI_MODEL: ${HANASAND_AI_MODEL:-hanasand}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${HANASAND_AI_BRIDGE_PORT:-18181}/health"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - hanasandnet

  ti-scraper:
    container_name: hanasand_ti_scraper
    image: hanasand_ti_scraper
    mem_limit: 96g
    cpus: "8.0"
    restart: always
    build:
      context: .
      dockerfile: ./ti/scraper/Dockerfile
    environment:
      SCRAPER_PORT: 8097
      SCRAPER_ENV: production
      SCRAPER_MEMORY_TARGET_MB: 98304
      SCRAPER_MEMORY_CEILING_MB: 163840
      SCRAPER_MAX_REQUEST_TASKS: 500
      SCRAPER_DARKNET_METADATA_ONLY: "true"
      SCRAPER_HIGH_RISK_REQUIRES_APPROVAL: "true"
      TI_EVIDENCE_ROOT: /var/lib/ti-scraper/evidence
      TI_EVIDENCE_METADATA_PATH: /var/lib/ti-scraper/evidence/metadata/scraper-store.json
      TI_EVIDENCE_OBJECT_DIR: /var/lib/ti-scraper/evidence/objects
      TI_CANARY_ENABLED: "true"
      TI_CANARY_AUTO_ACTIVATE: "false"
      TI_CANARY_INTERVAL_SECONDS: 300
      TI_CANARY_MAX_TASKS: 1200
      TI_CANARY_MAX_SOURCES: 1200
      TI_CANARY_MAX_CONCURRENT_TASKS: 32
      TI_CANARY_TIMEOUT_MS: 8000
      TI_CANARY_MAX_ITEMS_PER_TASK: 2
      TI_CANARY_MAX_QUEUE_SIZE: 10000
      TI_CANARY_BUDGET_TASKS: 1200
      TI_CANARY_BUDGET_BYTES: 768000000
      TI_SOURCE_TARGET_COUNT: 1000
      TI_SOURCE_SEED_ACTIVATE: "true"
      TI_SOURCE_SEED_PATHS: /app/ti/scraper/seeds/public_cti_sources.json,/app/ti/scraper/seeds/public_cti_starter_pack.json,/app/ti/scraper/seeds/public_telegram_channel_packs.json,/app/ti/scraper/seeds/public_threat_intel_generated_sources.json,/app/ti/scraper/seeds/high_value_exposure_source_candidates.json,/app/ti/scraper/seeds/restricted_metadata_source_packs.json
      TI_IMPORT_RESTRICTED_METADATA_SOURCES: ${TI_IMPORT_RESTRICTED_METADATA_SOURCES:-false}
      TI_IMPORT_CREDENTIAL_REQUIRED_SOURCES: ${TI_IMPORT_CREDENTIAL_REQUIRED_SOURCES:-false}
      HANASAND_AI_API_BASE: ${HANASAND_AI_API_BASE:-http://ai-parser-bridge:18181}
      HANASAND_AI_HEALTH_PATH: ${HANASAND_AI_HEALTH_PATH:-/health}
      HANASAND_AI_EXPOSURE_PARSE_PATH: ${HANASAND_AI_EXPOSURE_PARSE_PATH:-/v1/parse/exposure-claim}
      HANASAND_AI_PARSE_TIMEOUT_MS: ${HANASAND_AI_PARSE_TIMEOUT_MS:-12000}
    volumes:
      - ti_scraper_evidence:/var/lib/ti-scraper/evidence
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8097"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8097/v1/health"]
      interval: 5s
      retries: 5
      start_period: 20s
    networks:
      - hanasandnet
    depends_on:
      ai-parser-bridge:
        condition: service_started

  postgres:
    image: postgres:15
    container_name: hanasand_database
    mem_limit: 1g
    cpus: "2.0"
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hanasand}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB:-hanasand}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:${DB_LOCAL_PORT:-8503}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanasand -d hanasand"]
      interval: 5s
      retries: 5
    networks:
      - hanasandnet

  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: hanasand_mail
    mem_limit: 1g
    cpus: "2.0"
    restart: always
    environment:
      STALWART_RECOVERY_ADMIN: ${STALWART_RECOVERY_ADMIN:-${MAIL_ADMIN_USERNAME:-admin}:${MAIL_ADMIN_PASSWORD:-}}
    command: ["--config", "/opt/stalwart/etc/config.json"]
    volumes:
      - ./mail/stalwart:/opt/stalwart
    ports:
      - "127.0.0.1:${MAIL_HTTP_LOCAL_PORT:-8081}:8080"
      - "127.0.0.1:${MAIL_SMTP_LOCAL_PORT:-2525}:25"
      - "127.0.0.1:${MAIL_SMTPS_LOCAL_PORT:-2465}:465"
      - "127.0.0.1:${MAIL_SUBMISSION_LOCAL_PORT:-2587}:587"
      - "127.0.0.1:${MAIL_IMAP_LOCAL_PORT:-2143}:143"
      - "127.0.0.1:${MAIL_IMAPS_LOCAL_PORT:-2993}:993"
      - "127.0.0.1:${MAIL_MANAGESIEVE_LOCAL_PORT:-4191}:4190"
    networks:
      - hanasandnet

volumes:
  postgres_data:
  ti_scraper_evidence:

networks:
  pwnednet:
    external: true
  hanasandnet:
    driver: bridge
